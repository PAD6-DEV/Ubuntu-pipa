name: Build Ubuntu pipa images

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
      - "nightly-*"
      - "build-*"

permissions:
  contents: write

jobs:
  image:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        variant: [gnome, plasma]
    steps:
      - uses: actions/checkout@v4

      - name: Build builder image
        run: docker build -t ubuntu-pipa-builder .

      - name: Build ${{ matrix.variant }} image
        run: |
          mkdir -p output
          docker run --rm --privileged \
            -v "$PWD/output:/build/output" \
            -v /dev:/dev \
            -e BUILD_VARIANTS="${{ matrix.variant }}" \
            -e BUILD_GIT_REV="${{ github.sha }}" \
            -e PIPA_PKGS_URL="https://thespider2.github.io/pipa-pkgs/repo/ubuntu/" \
            ubuntu-pipa-builder

      - name: Upload ${{ matrix.variant }} archive
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-pipa-${{ matrix.variant }}
          path: |
            output/ubuntu-pipa-${{ matrix.variant }}-*.tar.xz
            output/ubuntu-pipa-${{ matrix.variant }}-*.tar.xz.sha256
          retention-days: 14
          if-no-files-found: error

  # Attach flashable archives to a git tag. GitHub hosts tag binaries via a
  # Release object for that tag.
  publish-tag:
    name: Attach images to tag
    needs: [image]
    runs-on: ubuntu-24.04-arm
    # Run for tag pushes, main pushes, and manual dispatch.
    if: always() && needs.image.result == 'success' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download GNOME archive
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-pipa-gnome
          path: tag-assets/

      - name: Download Plasma archive
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-pipa-plasma
          path: tag-assets/

      - name: Resolve tag name
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            # Main / manual builds get a dated build tag on this commit.
            TAG="build-${DATE}-${SHORT_SHA}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -f "$TAG" "$GITHUB_SHA"
            git push -f origin "refs/tags/$TAG"
          fi

          {
            echo "tag=${TAG}"
            echo "date=${DATE}"
          } >> "$GITHUB_OUTPUT"

          find tag-assets -type f \( -name '*.tar.xz' -o -name '*.sha256' \) -printf '%p\n' | sort

          cat > tag-notes.md <<EOF
          ## Ubuntu 26.04 for Xiaomi Pad 6 (pipa)

          Tag: \`${TAG}\`
          Build date: ${DATE}
          Commit: \`${GITHUB_SHA}\`

          ### Downloads (separate per desktop)

          | Variant | Archive |
          |---------|---------|
          | GNOME   | \`ubuntu-pipa-gnome-*.tar.xz\` |
          | Plasma  | \`ubuntu-pipa-plasma-*.tar.xz\` |

          Each archive contains flashables for that variant only:
          \`ubuntu_rootfs.raw\`, \`ubuntu_boot.raw\`, \`ubuntu_esp.raw\`,
          \`silicium.img\`, \`vbmeta-disabled.img\`, \`flash.sh\`, and
          \`flash-multiboot.sh\`.

          ### Flash

          \`\`\`bash
          tar -xJf ubuntu-pipa-gnome-YYYYMMDD.tar.xz
          cd ubuntu-pipa-gnome-YYYYMMDD
          ./flash.sh
          \`\`\`
          EOF
          sed -i 's/^          //' tag-notes.md

      - name: Upload assets to tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="Ubuntu Pipa ${TAG}"
          mapfile -t ASSETS < <(find tag-assets -type f \( -name '*.tar.xz' -o -name '*.sha256' \) | sort)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No tag assets found"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Updating assets on existing tag $TAG"
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
            gh release edit "$TAG" --title "$TITLE" --notes-file tag-notes.md --latest=false
          else
            echo "Creating tag asset bundle for $TAG"
            gh release create "$TAG" "${ASSETS[@]}" \
              --verify-tag \
              --title "$TITLE" \
              --notes-file tag-notes.md \
              --latest=false
          fi
