name: Build Ubuntu pipa images

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  image:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        variant: [gnome, plasma]
    steps:
      - uses: actions/checkout@v4

      - name: Build builder image
        run: docker build -t ubuntu-pipa-builder .

      - name: Build ${{ matrix.variant }} image
        run: |
          mkdir -p output
          docker run --rm --privileged \
            -v "$PWD/output:/build/output" \
            -v /dev:/dev \
            -e BUILD_VARIANTS="${{ matrix.variant }}" \
            -e BUILD_GIT_REV="${{ github.sha }}" \
            -e PIPA_PKGS_URL="https://thespider2.github.io/pipa-pkgs/repo/ubuntu/" \
            ubuntu-pipa-builder

      - name: Upload ${{ matrix.variant }} archive
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-pipa-${{ matrix.variant }}
          path: |
            output/ubuntu-pipa-${{ matrix.variant }}-*.tar.xz
            output/ubuntu-pipa-${{ matrix.variant }}-*.tar.xz.sha256
          retention-days: 14
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [image]
    runs-on: ubuntu-24.04-arm
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download GNOME archive
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-pipa-gnome
          path: release-assets/

      - name: Download Plasma archive
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-pipa-plasma
          path: release-assets/

      - name: Prepare release metadata
        id: meta
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y%m%d)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="nightly-${DATE}"
          fi
          {
            echo "tag=${TAG}"
            echo "date=${DATE}"
          } >> "$GITHUB_OUTPUT"

          ls -lah release-assets/
          # Flatten any nested dirs from artifact download
          find release-assets -type f \( -name '*.tar.xz' -o -name '*.sha256' \) -print

          cat > release-notes.md <<EOF
          ## Ubuntu 26.04 for Xiaomi Pad 6 (pipa)

          Build date: ${DATE}
          Commit: \`${GITHUB_SHA}\`

          ### Downloads (separate per desktop)

          | Variant | Archive |
          |---------|---------|
          | GNOME   | \`ubuntu-pipa-gnome-*.tar.xz\` |
          | Plasma  | \`ubuntu-pipa-plasma-*.tar.xz\` |

          Each archive contains flashables for that variant only:
          \`ubuntu_rootfs.raw\`, \`ubuntu_boot.raw\`, \`ubuntu_esp.raw\`,
          \`silicium.img\`, \`vbmeta-disabled.img\`, \`flash.sh\`, and
          \`flash-multiboot.sh\`.

          ### Flash

          \`\`\`bash
          tar -xJf ubuntu-pipa-gnome-YYYYMMDD.tar.xz
          cd ubuntu-pipa-gnome-YYYYMMDD   # or extract with --strip if flat
          ./flash.sh
          \`\`\`

          Archives are compressed with xz (\`.tar.xz\`).
          EOF
          # Fix leading indentation in heredoc body for nicer notes
          sed -i 's/^          //' release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          TITLE="Ubuntu Pipa ${TAG}"
          shopt -s nullglob
          ASSETS=(release-assets/*.tar.xz release-assets/*.sha256)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            # Artifacts may land in nested folders
            mapfile -t ASSETS < <(find release-assets -type f \( -name '*.tar.xz' -o -name '*.sha256' \) | sort)
          fi
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Updating existing release $TAG"
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
            gh release edit "$TAG" --title "$TITLE" --notes-file release-notes.md
          else
            echo "Creating release $TAG"
            # Nightly tags on main: recreate floating nightly tag
            if [[ "$TAG" == nightly-* ]]; then
              git tag -f "$TAG" "$GITHUB_SHA"
              git push -f origin "refs/tags/$TAG"
            fi
            gh release create "$TAG" "${ASSETS[@]}" \
              --title "$TITLE" \
              --notes-file release-notes.md \
              --latest
          fi
