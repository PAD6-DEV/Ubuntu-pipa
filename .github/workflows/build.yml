name: Build Ubuntu pipa images

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
      - "nightly-*"
      # build-* tags are created by publish-tag after a successful main/dispatch
      # build; do not list them here or the tag push would rebuild again.

permissions:
  contents: write

jobs:
  image:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        variant: [gnome, plasma]
    steps:
      - uses: actions/checkout@v4

      - name: Build builder image
        run: docker build -t ubuntu-pipa-builder .

      - name: Build ${{ matrix.variant }} image
        run: |
          mkdir -p output
          docker run --rm --privileged \
            -v "$PWD/output:/build/output" \
            -v /dev:/dev \
            -e BUILD_VARIANTS="${{ matrix.variant }}" \
            -e BUILD_GIT_REV="${{ github.sha }}" \
            -e PIPA_PKGS_URL="https://thespider2.github.io/pipa-pkgs/repo/ubuntu/" \
            ubuntu-pipa-builder

      - name: Upload ${{ matrix.variant }} archive
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-pipa-${{ matrix.variant }}
          path: |
            output/ubuntu-pipa-${{ matrix.variant }}-*.tar.xz
            output/ubuntu-pipa-${{ matrix.variant }}-*.tar.xz.sha256
          retention-days: 14
          if-no-files-found: error

  # Mark successful builds with a git tag only. Image archives exceed GitHub
  # Release asset size limits, so downloads come from the workflow artifacts
  # on this run (ubuntu-pipa-gnome / ubuntu-pipa-plasma), not a Release.
  publish-tag:
    name: Tag successful build
    needs: [image]
    runs-on: ubuntu-24.04
    if: always() && needs.image.result == 'success' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or confirm build tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y%m%d)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "Build already tagged as ${TAG}"
          else
            TAG="build-${DATE}-${SHORT_SHA}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            NOTES="$(cat <<EOF
          Ubuntu 26.04 for Xiaomi Pad 6 (pipa)

          Tag: ${TAG}
          Build date: ${DATE}
          Commit: ${GITHUB_SHA}

          Archives are workflow artifacts (not a GitHub Release — files exceed
          the release asset size limit). Download from:
          ${RUN_URL}

          Artifacts: ubuntu-pipa-gnome, ubuntu-pipa-plasma
          EOF
          )"
            # Strip common indent from the heredoc body.
            NOTES="$(printf '%s\n' "$NOTES" | sed 's/^          //')"
            git tag -f -a "$TAG" "$GITHUB_SHA" -m "$NOTES"
            git push -f origin "refs/tags/$TAG"
            echo "Created annotated tag ${TAG}"
          fi

          # Drop any Release that would re-introduce oversized assets for this tag.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting GitHub Release for ${TAG} (keep tag; use Actions artifacts)"
            gh release delete "$TAG" --yes
          fi
